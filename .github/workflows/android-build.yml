# ──────────────────────────────────────────────────────────────────────
#  Kinetix – Build Android APK (GitHub Actions)
# ──────────────────────────────────────────────────────────────────────
name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - "android-controller/**"
  pull_request:
    branches: [main]
    paths:
      - "android-controller/**"
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-v2-${{ hashFiles('android-controller/**/*.gradle*', 'android-controller/**/gradle-wrapper.properties') }}
          restore-keys: gradle-v2-

      - name: Make gradlew executable
        run: chmod +x android-controller/gradlew

      - name: Build debug APK
        working-directory: android-controller
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: kinetix-controller-debug
          path: android-controller/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
